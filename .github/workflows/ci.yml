name: CI

# Runs the test suite on every push and pull request to master, and publishes
# the Cucumber dashboard to GitHub Pages on pushes to master.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}   # allows manual runs from the Actions tab

# Permissions the GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # ubuntu-latest ships with Google Chrome preinstalled, and Selenium
      # Manager (bundled with Selenide) resolves the matching driver at runtime,
      # so there is nothing else to install.
      #
      # continue-on-error lets the report still be built and published when tests
      # fail; the "Fail the job" step below re-asserts the real result.
      - name: Run tests (headless)
        id: tests
        continue-on-error: true
        run: mvn -B test "-Dselenide.headless=true"

      # Build the rich HTML dashboard from the cucumber.json produced above.
      # -DskipTests reuses those results instead of re-running the browser.
      # github.run_number labels this run in the dashboard's trend history.
      - name: Build Cucumber dashboard
        if: always()
        run: mvn -B verify -DskipTests "-Dbuild.number=${{ github.run_number }}"

      # The Allure 3 report is rendered by the `allure` npm CLI, so Node is needed.
      - name: Set up Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Render the Allure 3 "Awesome" report from the target/allure-results written
      # by the Allure Cucumber adapter during the test run. Output goes to ./allure-report.
      - name: Build Allure report
        if: always()
        run: npx --yes allure@3 generate target/allure-results

      # Keep the raw report as a downloadable artifact on every run.
      - name: Upload Cucumber report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports/
          if-no-files-found: ignore

      # Combine both reports into a single site for GitHub Pages:
      #   /             a landing page linking to both reports
      #   /allure/      the Allure report (index.html)
      #   /cucumber/    the maven-cucumber-reporting dashboard (overview-features.html)
      - name: Assemble Pages site
        if: always()
        run: |
          mkdir -p _site/allure _site/cucumber
          cp -r allure-report/. _site/allure/ 2>/dev/null || true
          cp -r target/cucumber-html-reports/. _site/cucumber/ 2>/dev/null || true
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Selenide + Cucumber test reports</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; }
              h1 { font-size: 1.4rem; }
              a.report { display: block; padding: 1rem 1.25rem; margin: 0.75rem 0; border: 1px solid #d0d7de;
                         border-radius: 8px; text-decoration: none; color: #0969da; font-weight: 600; }
              a.report:hover { background: #f6f8fa; }
              p { color: #57606a; }
            </style>
          </head>
          <body>
            <h1>Selenide + Cucumber test reports</h1>
            <p>Latest results from the most recent push to master.</p>
            <a class="report" href="allure/index.html">Allure report</a>
            <a class="report" href="cucumber/overview-features.html">Cucumber dashboard</a>
          </body>
          </html>
          HTML

      # Stage the combined site for the Pages deploy job.
      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Fail the job if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "Tests failed — see the published report for details."
          exit 1

  deploy:
    # Publish to GitHub Pages only for pushes to master (not pull requests).
    # always() so the report is published even when tests failed.
    if: ${{ always() && github.event_name == 'push' }}
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # NOTE: GitHub Pages must be enabled once by hand for this repo:
      # Settings → Pages → Source → "GitHub Actions". The default GITHUB_TOKEN
      # cannot create the Pages site programmatically, so this cannot be
      # automated from the workflow.
      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
